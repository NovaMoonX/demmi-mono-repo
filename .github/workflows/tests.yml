name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-web:
    name: Web Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:web

  test-electron:
    name: Electron Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npm run build --workspace=@demmi/web
        env:
          VITE_FIREBASE_API_KEY: ''
          VITE_FIREBASE_AUTH_DOMAIN: ''
          VITE_FIREBASE_DATABASE_URL: ''
          VITE_FIREBASE_PROJECT_ID: ''
          VITE_FIREBASE_STORAGE_BUCKET: ''
          VITE_FIREBASE_MESSAGING_SENDER_ID: ''
          VITE_FIREBASE_APP_ID: ''
      - run: npm run build --workspace=@demmi/electron
      - run: xvfb-run npm run test:electron

  test-mobile:
    name: Mobile Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:mobile
